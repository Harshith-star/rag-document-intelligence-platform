<svg viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1000" height="220" fill="#f8fafc"/>
  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Document Ingestion &amp; Question-Answering Pipeline</text>

  <!-- steps -->
  <g font-size="12" fill="#1f2937">
    <!-- 1 -->
    <rect x="20" y="60" width="130" height="70" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="85" y="90" text-anchor="middle" font-weight="600">Upload</text>
    <text x="85" y="106" text-anchor="middle">.pdf / .txt / .md</text>

    <line x1="150" y1="95" x2="180" y2="95" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>

    <!-- 2 -->
    <rect x="180" y="60" width="130" height="70" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="245" y="90" text-anchor="middle" font-weight="600">Extract Text</text>
    <text x="245" y="106" text-anchor="middle">pypdf reader</text>

    <line x1="310" y1="95" x2="340" y2="95" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>

    <!-- 3 -->
    <rect x="340" y="60" width="130" height="70" rx="10" fill="#fef3c7" stroke="#d97706"/>
    <text x="405" y="90" text-anchor="middle" font-weight="600">Chunk Text</text>
    <text x="405" y="106" text-anchor="middle">800 chars, 100 overlap</text>

    <line x1="470" y1="95" x2="500" y2="95" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>

    <!-- 4 -->
    <rect x="500" y="60" width="150" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="575" y="90" text-anchor="middle" font-weight="600">Embed Chunks</text>
    <text x="575" y="106" text-anchor="middle">Gemini text-embedding-004</text>

    <line x1="650" y1="95" x2="680" y2="95" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>

    <!-- 5 -->
    <rect x="680" y="60" width="130" height="70" rx="10" fill="#cffafe" stroke="#0891b2"/>
    <text x="745" y="90" text-anchor="middle" font-weight="600">FAISS Index</text>
    <text x="745" y="106" text-anchor="middle">per-user IndexFlatL2</text>

    <line x1="810" y1="95" x2="840" y2="95" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>

    <!-- 6 -->
    <rect x="840" y="60" width="140" height="70" rx="10" fill="#fee2e2" stroke="#dc2626"/>
    <text x="910" y="90" text-anchor="middle" font-weight="600">Gemini Answer</text>
    <text x="910" y="106" text-anchor="middle">grounded in top-k chunks</text>
  </g>

  <!-- query path note -->
  <text x="500" y="165" text-anchor="middle" font-size="12" fill="#6b7280">Question flow: question → embed query → FAISS top-k retrieval → Gemini generates answer (cites source filenames)</text>
  <text x="500" y="185" text-anchor="middle" font-size="11" fill="#9ca3af">Each upload and each question is logged for the dashboard metrics (chunks, processing time, response time).</text>
</svg>
