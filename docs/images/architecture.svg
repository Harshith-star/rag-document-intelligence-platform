<svg viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1000" height="460" fill="#f8fafc"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">RAG Document QA — System Architecture</text>

  <!-- React -->
  <rect x="40" y="170" width="150" height="80" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="115" y="205" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">React</text>
  <text x="115" y="223" text-anchor="middle" font-size="11" fill="#1e3a8a">Login / Dashboard</text>
  <text x="115" y="238" text-anchor="middle" font-size="11" fill="#1e3a8a">Upload / Chat</text>

  <!-- Axios label -->
  <text x="245" y="195" text-anchor="middle" font-size="11" fill="#6b7280">Axios</text>
  <text x="245" y="208" text-anchor="middle" font-size="11" fill="#6b7280">(JWT bearer)</text>
  <line x1="190" y1="210" x2="300" y2="210" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="225" x2="190" y2="225" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FastAPI -->
  <rect x="300" y="160" width="150" height="100" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="375" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">FastAPI</text>
  <text x="375" y="208" text-anchor="middle" font-size="11" fill="#14532d">Routers (controllers)</text>
  <text x="375" y="223" text-anchor="middle" font-size="11" fill="#14532d">Global exception</text>
  <text x="375" y="237" text-anchor="middle" font-size="11" fill="#14532d">handler + logging</text>

  <line x1="450" y1="200" x2="555" y2="200" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Services -->
  <rect x="555" y="160" width="150" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="630" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#78350f">Services</text>
  <text x="630" y="208" text-anchor="middle" font-size="11" fill="#78350f">AuthService</text>
  <text x="630" y="223" text-anchor="middle" font-size="11" fill="#78350f">DocumentService</text>
  <text x="630" y="237" text-anchor="middle" font-size="11" fill="#78350f">QAService</text>

  <line x1="705" y1="200" x2="800" y2="200" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Repositories -->
  <rect x="800" y="160" width="150" height="100" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="875" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#4c1d95">Repositories</text>
  <text x="875" y="208" text-anchor="middle" font-size="11" fill="#4c1d95">UserRepository</text>
  <text x="875" y="223" text-anchor="middle" font-size="11" fill="#4c1d95">DocumentRepository</text>
  <text x="875" y="237" text-anchor="middle" font-size="11" fill="#4c1d95">QueryLogRepository</text>

  <line x1="875" y1="260" x2="875" y2="330" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PostgreSQL -->
  <rect x="780" y="330" width="190" height="70" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
  <text x="875" y="360" text-anchor="middle" font-size="14" font-weight="600" fill="#164e63">PostgreSQL</text>
  <text x="875" y="378" text-anchor="middle" font-size="11" fill="#164e63">users · documents · query_logs</text>
  <text x="875" y="392" text-anchor="middle" font-size="10" fill="#164e63">schema managed by Alembic</text>

  <!-- Services down to AI/FAISS -->
  <line x1="630" y1="260" x2="630" y2="330" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="430" y="330" width="220" height="80" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="540" y="358" text-anchor="middle" font-size="14" font-weight="600" fill="#7f1d1d">FAISS + Gemini</text>
  <text x="540" y="376" text-anchor="middle" font-size="11" fill="#7f1d1d">per-user vector index</text>
  <text x="540" y="391" text-anchor="middle" font-size="11" fill="#7f1d1d">embeddings + answer generation</text>

  <!-- Local storage -->
  <line x1="555" y1="220" x2="480" y2="220" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4 3" transform="translate(0,90)"/>
  <rect x="150" y="330" width="190" height="70" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="245" y="360" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">File Storage</text>
  <text x="245" y="378" text-anchor="middle" font-size="11" fill="#1e293b">uploaded PDFs / TXT / MD</text>
  <text x="245" y="392" text-anchor="middle" font-size="10" fill="#1e293b">(swappable for S3)</text>
  <line x1="375" y1="260" x2="280" y2="330" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
