# docker-compose.yml — one-command self-contained startup
# Usage:
#   cp .env.example .env   # fill in SECRET_KEY, GEMINI_API_KEY, POSTGRES_PASSWORD
#   docker compose up --build
#
# Startup order:
#   postgres (healthy) ─┐
#   redis    (healthy) ─┤─▶ backend (waits for both via depends_on + entrypoint.sh)
#                        └─▶ frontend (waits for backend)

services:
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      POSTGRES_USER:     raguser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB:       ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout:  5s
      retries:  10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  5s
      retries:  10
      start_period: 5s
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      # Required — no defaults; app refuses to start if unset.
      SECRET_KEY:   ${SECRET_KEY:?SECRET_KEY must be set in .env}
      DATABASE_URL: postgresql+asyncpg://raguser:${POSTGRES_PASSWORD}@postgres:5432/ragdb

      # Postgres connection info for pg_isready in entrypoint.sh
      PGHOST:     postgres
      PGUSER:     raguser
      PGDATABASE: ragdb

      # Optional
      GEMINI_API_KEY:    ${GEMINI_API_KEY:-}
      GEMINI_MODEL:      ${GEMINI_MODEL:-gemini-2.5-flash}
      EMBEDDING_MODEL:   ${EMBEDDING_MODEL:-models/gemini-embedding-001}
      REDIS_URL:         redis://redis:6379/0
      CACHE_ENABLED:     ${CACHE_ENABLED:-true}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-86400}
      LOG_LEVEL:         ${LOG_LEVEL:-INFO}
    volumes:
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_storage:
